<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FEAST PR Reviewer Spinner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #1a0a2e;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(120, 40, 200, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 50%, rgba(255, 100, 50, 0.1) 0%, transparent 50%);
    font-family: 'Bangers', cursive;
    overflow: hidden;
  }

  h1 {
    font-size: 2.8rem;
    color: #ffd700;
    text-shadow: 3px 3px 0 #ff6b35, 6px 6px 0 rgba(0,0,0,0.3);
    margin-bottom: 0.3rem;
    letter-spacing: 3px;
  }

  .subtitle {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.65rem;
    color: #b388ff;
    margin-bottom: 2rem;
    letter-spacing: 2px;
  }

  .spinner-container {
    position: relative;
    width: 480px;
    height: 480px;
  }

  .wheel-border {
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    background: conic-gradient(
      from 0deg,
      #ffd700, #ff6b35, #ff1744, #e040fb, #7c4dff,
      #448aff, #00e5ff, #00e676, #ffea00, #ffd700
    );
    box-shadow:
      0 0 40px rgba(255, 215, 0, 0.4),
      0 0 80px rgba(255, 107, 53, 0.2),
      inset 0 0 30px rgba(0,0,0,0.3);
  }

  .wheel-border::after {
    content: '';
    position: absolute;
    inset: 6px;
    border-radius: 50%;
    background: #1a0a2e;
  }

  .notches {
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    z-index: 1;
  }

  .notch {
    position: absolute;
    width: 10px;
    height: 10px;
    background: #ffd700;
    border-radius: 50%;
    box-shadow: 0 0 6px #ffd700, 0 0 12px rgba(255, 215, 0, 0.5);
    top: 50%;
    left: 50%;
    transform-origin: 0 0;
  }

  .notch.lit {
    background: #fff;
    box-shadow: 0 0 10px #fff, 0 0 20px #ffd700, 0 0 30px #ffd700;
  }

  canvas {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    z-index: 2;
    cursor: pointer;
  }

  .center-hub {
    position: absolute;
    width: 80px;
    height: 80px;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle at 35% 35%, #ffd700, #b8860b);
    border-radius: 50%;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-family: 'Press Start 2P', monospace;
    color: #1a0a2e;
    cursor: pointer;
    box-shadow:
      0 4px 15px rgba(0,0,0,0.5),
      inset 0 2px 4px rgba(255,255,255,0.4);
    transition: transform 0.1s;
    text-align: center;
    line-height: 1.4;
  }

  .center-hub:hover { transform: translate(-50%, -50%) scale(1.08); }
  .center-hub:active { transform: translate(-50%, -50%) scale(0.95); }

  .pointer-container {
    position: absolute;
    top: -38px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
  }

  .pointer {
    width: 0;
    height: 0;
    border-left: 22px solid transparent;
    border-right: 22px solid transparent;
    border-top: 50px solid #ff1744;
    position: relative;
  }

  .pointer::after {
    content: '';
    position: absolute;
    top: -50px;
    left: -22px;
    width: 0;
    height: 0;
    border-left: 22px solid transparent;
    border-right: 22px solid transparent;
    border-top: 14px solid #ff1744;
  }

  .result-banner {
    margin-top: 2rem;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.5s;
  }

  .result-banner .chosen-name {
    font-size: 3rem;
    color: #ffd700;
    text-shadow: 3px 3px 0 #ff6b35, 0 0 30px rgba(255, 215, 0, 0.5);
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .result-banner .chosen-name.show {
    opacity: 1;
    transform: scale(1);
  }

  .result-banner .chosen-role {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.6rem;
    color: #b388ff;
    margin-top: 0.5rem;
    opacity: 0;
    transition: opacity 0.5s 0.3s;
  }

  .result-banner .chosen-role.show {
    opacity: 1;
  }

  .result-avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 3px solid #ffd700;
    margin-bottom: 0.5rem;
    opacity: 0;
    transform: scale(0.5);
    transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
  }

  .result-avatar.show {
    opacity: 1;
    transform: scale(1);
  }

  .confetti {
    position: fixed;
    pointer-events: none;
    z-index: 100;
  }

  .confetti-piece {
    position: absolute;
    width: 10px;
    height: 10px;
    opacity: 0;
  }

  .instructions {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.5rem;
    color: rgba(179, 136, 255, 0.5);
    margin-top: 1.5rem;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<h1>WHO REVIEWS?!</h1>
<p class="subtitle">FEAST PR REVIEWER ROULETTE</p>

<div class="spinner-container">
  <div class="wheel-border"></div>
  <div class="notches" id="notches"></div>
  <canvas id="wheel" width="480" height="480"></canvas>
  <div class="center-hub" id="spinBtn">SPIN!</div>
  <div class="pointer-container">
    <div class="pointer"></div>
  </div>
</div>

<div class="result-banner" id="resultBanner">
  <img class="result-avatar" id="resultAvatar" src="" alt="">
  <div class="chosen-name" id="chosenName"></div>
  <div class="chosen-role" id="chosenRole"></div>
</div>

<p class="instructions">CLICK THE WHEEL OR PRESS SPACE TO SPIN</p>

<script>
const REVIEWERS = [
  { name: 'Abanish',  github: 'abanishkhatry',   avatar: 'https://avatars.githubusercontent.com/u/148647420?v=4', color: '#ff6b35' },
  { name: 'Hadeel',   github: 'hadeelmanimaran',  avatar: 'https://avatars.githubusercontent.com/u/170122973?v=4', color: '#e040fb' },
  { name: 'Edric',    github: 'MiniMiniFridge',    avatar: 'https://avatars.githubusercontent.com/u/142858018?v=4', color: '#448aff' },
  { name: 'Shrivas',  github: 'shrivasshankar',    avatar: 'https://avatars.githubusercontent.com/u/86219405?v=4',  color: '#00e676' },
  { name: 'James',    github: 'jdesilver',         avatar: 'https://avatars.githubusercontent.com/u/162068796?v=4', color: '#ffea00' },
];

const SEGMENT_COLORS_DARK = ['#2d1250', '#1a2744', '#0d3328', '#3b2200', '#2a0a2a'];

const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const spinBtn = document.getElementById('spinBtn');
const chosenName = document.getElementById('chosenName');
const chosenRole = document.getElementById('chosenRole');
const resultAvatar = document.getElementById('resultAvatar');

const N = REVIEWERS.length;
const ARC = (2 * Math.PI) / N;
const CX = canvas.width / 2;
const CY = canvas.height / 2;
const R = canvas.width / 2 - 4;

let currentAngle = 0;
let spinning = false;
let avatarImages = {};

REVIEWERS.forEach(r => {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = r.avatar;
  img.onload = () => { avatarImages[r.name] = img; drawWheel(); };
});

function drawWheel() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(CX, CY);
  ctx.rotate(currentAngle);

  for (let i = 0; i < N; i++) {
    const startAngle = i * ARC - Math.PI / 2;
    const endAngle = startAngle + ARC;
    const midAngle = startAngle + ARC / 2;

    // Segment fill
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, R, startAngle, endAngle);
    ctx.closePath();

    const grad = ctx.createRadialGradient(0, 0, 40, 0, 0, R);
    grad.addColorStop(0, SEGMENT_COLORS_DARK[i]);
    grad.addColorStop(0.7, SEGMENT_COLORS_DARK[i]);
    grad.addColorStop(1, REVIEWERS[i].color + '40');
    ctx.fillStyle = grad;
    ctx.fill();

    // Segment border
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(Math.cos(startAngle) * R, Math.sin(startAngle) * R);
    ctx.strokeStyle = REVIEWERS[i].color + '80';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Avatar
    const avatarR = 32;
    const avatarDist = R * 0.55;
    const ax = Math.cos(midAngle) * avatarDist;
    const ay = Math.sin(midAngle) * avatarDist;

    if (avatarImages[REVIEWERS[i].name]) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(ax, ay, avatarR, 0, 2 * Math.PI);
      ctx.closePath();
      ctx.clip();
      ctx.drawImage(avatarImages[REVIEWERS[i].name], ax - avatarR, ay - avatarR, avatarR * 2, avatarR * 2);
      ctx.restore();

      // Avatar border
      ctx.beginPath();
      ctx.arc(ax, ay, avatarR + 2, 0, 2 * Math.PI);
      ctx.strokeStyle = REVIEWERS[i].color;
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    // Name
    ctx.save();
    const textDist = R * 0.84;
    const tx = Math.cos(midAngle) * textDist;
    const ty = Math.sin(midAngle) * textDist;
    ctx.translate(tx, ty);
    ctx.rotate(midAngle + Math.PI / 2);
    ctx.font = 'bold 18px Bangers, cursive';
    ctx.fillStyle = REVIEWERS[i].color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.7)';
    ctx.shadowBlur = 4;
    ctx.fillText(REVIEWERS[i].name.toUpperCase(), 0, 0);
    ctx.restore();

    // GitHub handle
    ctx.save();
    const handleDist = R * 0.34;
    const hx = Math.cos(midAngle) * handleDist;
    const hy = Math.sin(midAngle) * handleDist;
    ctx.translate(hx, hy);
    ctx.rotate(midAngle + Math.PI / 2);
    ctx.font = '10px "Press Start 2P", monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('@' + REVIEWERS[i].github.slice(0, 12), 0, 0);
    ctx.restore();
  }

  ctx.restore();
}

// Notch lights around the border
const notchContainer = document.getElementById('notches');
const NUM_NOTCHES = 24;
for (let i = 0; i < NUM_NOTCHES; i++) {
  const notch = document.createElement('div');
  notch.className = 'notch';
  const angle = (i / NUM_NOTCHES) * 2 * Math.PI - Math.PI / 2;
  const notchR = 258;
  const nx = Math.cos(angle) * notchR;
  const ny = Math.sin(angle) * notchR;
  notch.style.transform = `translate(${nx - 5}px, ${ny - 5}px)`;
  notchContainer.appendChild(notch);
}

let notchInterval = null;
function startNotchAnimation() {
  let offset = 0;
  const notches = document.querySelectorAll('.notch');
  notchInterval = setInterval(() => {
    notches.forEach((n, i) => {
      n.classList.toggle('lit', (i + offset) % 3 === 0);
    });
    offset++;
  }, 100);
}

function stopNotchAnimation() {
  if (notchInterval) clearInterval(notchInterval);
  document.querySelectorAll('.notch').forEach(n => n.classList.remove('lit'));
}

// Click sound simulation via oscillator
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function playTick() {
  if (!audioCtx) audioCtx = new AudioCtx();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.frequency.value = 800 + Math.random() * 400;
  osc.type = 'square';
  gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.05);
}

function playFanfare() {
  if (!audioCtx) audioCtx = new AudioCtx();
  const notes = [523, 659, 784, 1047];
  notes.forEach((freq, i) => {
    setTimeout(() => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      osc.type = 'square';
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
    }, i * 120);
  });
}

function launchConfetti() {
  const colors = ['#ff6b35', '#ffd700', '#e040fb', '#448aff', '#00e676', '#ff1744', '#ffea00'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = (window.innerWidth / 2 + (Math.random() - 0.5) * 100) + 'px';
    el.style.top = (window.innerHeight / 2) + 'px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    document.body.appendChild(el);

    const angle = Math.random() * Math.PI * 2;
    const velocity = 300 + Math.random() * 500;
    const vx = Math.cos(angle) * velocity;
    const vy = Math.sin(angle) * velocity - 400;
    const rot = Math.random() * 720 - 360;

    el.animate([
      { opacity: 1, transform: 'translate(0, 0) rotate(0deg)' },
      { opacity: 1, transform: `translate(${vx * 0.5}px, ${vy * 0.3}px) rotate(${rot * 0.5}deg)`, offset: 0.4 },
      { opacity: 0, transform: `translate(${vx}px, ${vy + 600}px) rotate(${rot}deg)` },
    ], {
      duration: 1500 + Math.random() * 1000,
      easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
    }).onfinish = () => el.remove();
  }
}

function getSelectedIndex(angle) {
  // The pointer is at the top (12 o'clock). We need to figure out which segment
  // is at that position. The wheel is rotated by currentAngle, and segments
  // start at -PI/2 (12 o'clock) going clockwise.
  const pointerAngle = -Math.PI / 2;
  let normalizedAngle = -(angle % (2 * Math.PI));
  if (normalizedAngle < 0) normalizedAngle += 2 * Math.PI;
  const idx = Math.floor(normalizedAngle / ARC);
  return idx % N;
}

function spin() {
  if (spinning) return;
  spinning = true;

  chosenName.classList.remove('show');
  chosenRole.classList.remove('show');
  resultAvatar.classList.remove('show');

  startNotchAnimation();

  const extraTurns = 5 + Math.random() * 5;
  const targetAngle = currentAngle + extraTurns * 2 * Math.PI + Math.random() * 2 * Math.PI;
  const duration = 4000 + Math.random() * 2000;
  const startTime = performance.now();
  const startAngle = currentAngle;
  const totalDelta = targetAngle - startAngle;

  let lastSegment = -1;

  function animate(now) {
    const elapsed = now - startTime;
    const t = Math.min(elapsed / duration, 1);
    // Deceleration curve
    const eased = 1 - Math.pow(1 - t, 4);
    currentAngle = startAngle + totalDelta * eased;
    drawWheel();

    const seg = getSelectedIndex(currentAngle);
    if (seg !== lastSegment) {
      playTick();
      lastSegment = seg;
    }

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      spinning = false;
      stopNotchAnimation();

      const winner = REVIEWERS[seg];
      resultAvatar.src = winner.avatar;
      chosenName.textContent = winner.name;
      chosenRole.textContent = 'SHALL REVIEW YOUR PR';

      setTimeout(() => {
        resultAvatar.classList.add('show');
        chosenName.classList.add('show');
        chosenRole.classList.add('show');
        playFanfare();
        launchConfetti();
      }, 200);
    }
  }

  requestAnimationFrame(animate);
}

spinBtn.addEventListener('click', spin);
canvas.addEventListener('click', spin);
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); spin(); }
});

drawWheel();
</script>
</body>
</html>
